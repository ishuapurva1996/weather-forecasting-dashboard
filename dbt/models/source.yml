version: 2

sources:
  - name: raw
    database: "{{ env_var('DBT_DATABASE') }}"
    schema: RAW
    description: Raw weather data loaded by Airflow ETL DAG
    tables:
      - name: weather_etl_multiple_cities
        description: Historical weather from Open-Meteo, refreshed daily with last 60 days

  - name: forecast
    database: "{{ env_var('DBT_DATABASE') }}"
    schema: ANALYTICS
    description: Snowflake ML forecast output, regenerated daily by Airflow forecast DAG
    tables:
      - name: weather_forecast_lab1
        description: 7-day temp_max forecasts with 95% prediction intervals
